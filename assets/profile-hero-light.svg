<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">Animated hooded cyber security GitHub hero - light</title>
  <desc id="desc">Pure SVG light-mode cyber hero inspired by a hooded neon hacker image, recolored with blue, cyan, and emerald accents.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="52%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <radialGradient id="bgGlowA" cx="25%" cy="25%" r="62%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".32"/>
      <stop offset="56%" stop-color="#06b6d4" stop-opacity=".11"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowB" cx="76%" cy="86%" r="56%">
      <stop offset="0%" stop-color="#10b981" stop-opacity=".22"/>
      <stop offset="62%" stop-color="#2563eb" stop-opacity=".07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .14 0 0 0 0 .38 0 0 0 0 .95 0 0 0 .45 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="emeraldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .04 0 0 0 0 .65 0 0 0 0 .42 0 0 0 .5 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".82" numOctaves="2" seed="33"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .024"/></feComponentTransfer>
    </filter>
    <pattern id="mesh" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <path d="M0 0H5" stroke="#0f172a" stroke-opacity=".04"/>
      <path d="M0 2.5H5" stroke="#2563eb" stroke-opacity=".03"/>
    </pattern>
    <clipPath id="round"><rect x="18" y="18" width="1144" height="574" rx="34"/></clipPath>
    <mask id="typingMask"><rect x="668" y="172" width="0" height="36" fill="#fff"><animate attributeName="width" values="0;342;342;0" keyTimes="0;.34;.78;1" dur="7s" repeatCount="indefinite"/></rect></mask>
    <style>.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.sans{font-family:Inter,Segoe UI,Arial,sans-serif}</style>
  </defs>
  <g clip-path="url(#round)">
    <rect width="1180" height="610" fill="#ffffff"/>
    <rect width="1180" height="610" fill="url(#bgGlowA)"/>
    <rect width="1180" height="610" fill="url(#bgGlowB)"/>
    <rect width="1180" height="610" filter="url(#noise)" opacity=".65"/>
    <path d="M0 488 C190 420 320 466 468 438 C656 402 792 448 1180 392 V610 H0Z" fill="#e2e8f0" opacity=".42"/>
    <rect x="18" y="18" width="1144" height="574" rx="34" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-dasharray="160 850" opacity=".7"><animate attributeName="stroke-dashoffset" values="0;-1010" dur="9s" repeatCount="indefinite"/></rect>

    <g transform="translate(118 52)" filter="url(#shadow)">
      <ellipse cx="252" cy="504" rx="150" ry="20" fill="#94a3b8" opacity=".28"/>
      <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="5.5s" repeatCount="indefinite"/>
        <path d="M160 158 C172 52 328 52 346 158 C358 230 329 275 306 292 L200 292 C172 270 150 229 160 158Z" fill="url(#fabric)" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
        <path d="M188 166 C205 102 304 98 322 166 C333 213 306 242 284 258 C254 280 215 258 198 236 C184 218 181 192 188 166Z" fill="#0f172a"/>
        <path d="M178 160 C194 88 314 83 332 160" fill="none" stroke="#2563eb" stroke-opacity=".74" stroke-width="2"/>
        <path d="M251 72 V118" stroke="#10b981" stroke-width="3" filter="url(#emeraldGlow)"/>
        <path d="M214 188 C232 196 244 195 254 184 C235 180 224 177 214 168 C213 174 212 181 214 188Z" fill="#10b981" filter="url(#emeraldGlow)"><animate attributeName="opacity" values=".86;1;.86" dur="1.7s" repeatCount="indefinite"/></path>
        <path d="M291 188 C273 196 261 195 251 184 C270 180 281 177 291 168 C292 174 293 181 291 188Z" fill="#06b6d4" filter="url(#glow)"><animate attributeName="opacity" values="1;.72;1" dur="1.9s" repeatCount="indefinite"/></path>
        <path d="M98 270 C126 226 169 210 202 214 H306 C346 214 392 232 418 272 L380 392 H126Z" fill="url(#fabric)" stroke="url(#accent)" stroke-width="3" filter="url(#emeraldGlow)"/>
        <rect x="126" y="294" width="254" height="130" rx="20" fill="#ffffff" opacity=".48"/><rect x="126" y="294" width="254" height="130" rx="20" fill="url(#mesh)"/>
        <path d="M253 258 V448" stroke="#2563eb" stroke-width="3" filter="url(#glow)"/>
        <path d="M244 258 C250 273 258 273 264 258" fill="none" stroke="#0f172a" stroke-opacity=".58" stroke-width="4"/>
        <g stroke="#475569" stroke-width="2"><path d="M255 282 h14 M255 296 h14 M255 310 h14 M255 324 h14 M255 338 h14 M255 352 h14 M255 366 h14 M255 380 h14 M255 394 h14"/></g>
        <path d="M105 274 C62 340 66 397 113 424 C142 404 156 370 154 324" fill="url(#fabric)" stroke="#10b981" stroke-width="3"/>
        <path d="M400 274 C444 340 441 397 392 424 C363 404 350 370 352 324" fill="url(#fabric)" stroke="#2563eb" stroke-width="3"/>
        <path d="M148 364 H254 M126 424 H380 M254 364 H358" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
        <path d="M162 324 C190 318 221 319 252 324 V426 H150 C140 395 143 362 162 324Z" fill="#dbeafe" opacity=".32" stroke="#2563eb" stroke-width="2"/>
        <path d="M346 324 C318 318 286 319 254 324 V426 H370 C381 392 371 356 346 324Z" fill="#d1fae5" opacity=".32" stroke="#10b981" stroke-width="2"/>
        <rect x="320" y="280" width="58" height="58" rx="10" fill="#f8fafc" stroke="#10b981" stroke-width="3" filter="url(#emeraldGlow)"/>
        <path d="M349 294 a11 11 0 0 1 11 11 c0 6-5 10-11 10s-11-4-11-10a11 11 0 0 1 11-11Z" fill="#10b981"/>
        <path d="M337 327 L363 315 M337 315 L363 327" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
        <path d="M160 424 C175 468 175 522 165 572 H222 C232 512 246 474 253 424Z" fill="url(#fabric)" stroke="#2563eb" stroke-width="3"/>
        <path d="M286 424 C292 474 307 512 318 572 H377 C363 522 360 468 344 424Z" fill="url(#fabric)" stroke="#10b981" stroke-width="3"/>
        <path d="M168 568 C122 570 106 588 100 604 H232 C231 582 207 570 168 568Z" fill="#d1fae5" stroke="#10b981" stroke-width="3" filter="url(#emeraldGlow)"/>
        <path d="M318 568 C364 570 391 585 397 604 H276 C277 583 286 572 318 568Z" fill="#dbeafe" stroke="#2563eb" stroke-width="3" filter="url(#glow)"/>
        <path d="M112 591 C140 582 174 581 221 586 M289 586 C326 579 360 582 388 593" stroke="#0f172a" stroke-opacity=".26" stroke-width="2"/>
      </g>
    </g>

    <g transform="translate(548 70)" filter="url(#shadow)">
      <rect width="560" height="460" rx="26" fill="#f8fafc" fill-opacity=".84" stroke="#0f172a" stroke-opacity=".08"/>
      <rect width="560" height="460" rx="26" fill="#ffffff" opacity=".32"/>
      <path d="M26 48 H534" stroke="#0f172a" stroke-opacity=".08"/>
      <circle cx="38" cy="25" r="6" fill="#ef4444"/><circle cx="60" cy="25" r="6" fill="#f59e0b"/><circle cx="82" cy="25" r="6" fill="#10b981"/>
      <text class="mono" x="112" y="31" fill="#475569" font-size="13">cyber-avatar.svg</text>
      <text class="mono" x="42" y="92" fill="#2563eb" font-size="17">$ render --profile-hero</text>
      <text class="sans" x="42" y="142" fill="#0f172a" font-size="38" font-weight="800">Gobinathan Mugilan</text>
      <text class="mono" x="42" y="194" fill="#475569" font-size="20">style:</text>
      <text class="mono" x="120" y="194" fill="url(#accent)" font-size="20" font-weight="800" mask="url(#typingMask)">cyber security student</text>
      <rect x="468" y="174" width="10" height="25" rx="2" fill="#2563eb"><animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></rect>
      <g class="mono" font-size="16">
        <text x="42" y="248" fill="#475569" opacity="0">palette  <tspan fill="#0f172a">blue + cyan + emerald</tspan><animate attributeName="opacity" values="0;1" begin=".5s" dur=".5s" fill="freeze"/></text>
        <text x="42" y="284" fill="#475569" opacity="0">motion   <tspan fill="#0f172a">scanlines, particles, glow pulse</tspan><animate attributeName="opacity" values="0;1" begin=".9s" dur=".5s" fill="freeze"/></text>
        <text x="42" y="320" fill="#475569" opacity="0">format   <tspan fill="#0f172a">pure SVG / GitHub README safe</tspan><animate attributeName="opacity" values="0;1" begin="1.3s" dur=".5s" fill="freeze"/></text>
      </g>
      <g transform="translate(42 356)">
        <rect width="112" height="34" rx="17" fill="#ffffff" stroke="#2563eb" stroke-opacity=".38"/><text class="sans" x="20" y="23" fill="#0f172a" font-size="14" font-weight="700">Glass UI</text>
        <rect x="124" width="128" height="34" rx="17" fill="#ffffff" stroke="#06b6d4" stroke-opacity=".42"/><text class="sans" x="144" y="23" fill="#0f172a" font-size="14" font-weight="700">Scanline</text>
        <rect x="264" width="130" height="34" rx="17" fill="#ffffff" stroke="#10b981" stroke-opacity=".42"/><text class="sans" x="286" y="23" fill="#0f172a" font-size="14" font-weight="700">Glow Pulse</text>
      </g>
      <rect x="0" y="0" width="560" height="460" rx="26" fill="none" stroke="url(#accent)" stroke-width="1.2" stroke-dasharray="120 620" opacity=".6"><animate attributeName="stroke-dashoffset" values="0;-740" dur="8s" repeatCount="indefinite"/></rect>
      <rect x="30" y="-20" width="110" height="500" fill="url(#shine)" opacity=".16" transform="skewX(-16)"><animateTransform attributeName="transform" type="translate" values="-220 0;680 0;-220 0" dur="7s" repeatCount="indefinite" additive="sum"/></rect>
    </g>
    <g opacity=".62"><circle cx="1050" cy="120" r="2.4" fill="#2563eb"><animate attributeName="opacity" values=".2;1;.2" dur="2.5s" repeatCount="indefinite"/></circle><circle cx="498" cy="108" r="2" fill="#10b981"><animate attributeName="opacity" values="1;.25;1" dur="3s" repeatCount="indefinite"/></circle><circle cx="82" cy="492" r="2.2" fill="#06b6d4"><animate attributeName="opacity" values=".25;1;.25" dur="2.8s" repeatCount="indefinite"/></circle></g>
    <rect x="0" y="96" width="1180" height="42" fill="#2563eb" opacity=".035"><animate attributeName="y" values="70;520;70" dur="5.2s" repeatCount="indefinite"/></rect>
  </g>
</svg>
