<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1420" viewBox="0 0 1180 1420" role="img" aria-labelledby="title desc">
  <title id="title">Animated About, Skills, and Projects for Gobinathan Mugilan</title>
  <desc id="desc">Animated GitHub profile details showing about me, technical skills, and featured cyber security projects.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e2b"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="48%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="16s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glowTop" cx="18%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".32"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity=".1"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowBottom" cx="78%" cy="88%" r="48%">
      <stop offset="0%" stop-color="#10b981" stop-opacity=".22"/>
      <stop offset="62%" stop-color="#22d3ee" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity=".38"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.82 0 0 0 0 1 0 0 0 .64 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .03"/>
      </feComponentTransfer>
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { fill: #f8fafc; font-size: 34px; font-weight: 800; }
      .label { fill: #22d3ee; font-size: 18px; font-weight: 700; }
      .text { fill: #cbd5e1; font-size: 21px; }
      .muted { fill: #94a3b8; font-size: 18px; }
      .chip { fill: #f8fafc; font-size: 17px; font-weight: 700; }
      .card { fill: #0f172a; fill-opacity: .76; stroke: #ffffff; stroke-opacity: .08; }
      .fade { opacity: 0; transform-box: fill-box; transform-origin: center; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="1420" rx="34" fill="url(#bg)"/>
  <rect x="0" y="0" width="1180" height="1420" rx="34" fill="url(#glowTop)"/>
  <rect x="0" y="0" width="1180" height="1420" rx="34" fill="url(#glowBottom)"/>
  <rect width="1180" height="1420" filter="url(#noise)" opacity=".9"/>

  <rect x="24" y="24" width="1132" height="1372" rx="30" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="210 980" opacity=".68">
    <animate attributeName="stroke-dashoffset" values="0;-1190" dur="12s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(70 70)">
    <text class="mono label" x="0" y="0">$ profile --animate-sections</text>
    <text class="sans title" x="0" y="48">About, Skills, and Featured Builds</text>
    <text class="mono muted" x="0" y="82">cyber security student | python developer | AI-driven security builder</text>
    <rect x="0" y="110" width="1040" height="2" fill="url(#scan)" opacity=".8">
      <animate attributeName="x" values="-1040;1040;-1040" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g class="fade" transform="translate(70 220)" filter="url(#shadow)">
    <animate attributeName="opacity" values="0;1" begin=".2s" dur=".7s" fill="freeze"/>
    <rect class="card" x="0" y="0" width="1040" height="300" rx="22"/>
    <rect x="0" y="0" width="1040" height="300" rx="22" fill="url(#accent)" opacity=".045"/>
    <text class="mono label" x="34" y="48">01_about_me</text>
    <g class="sans text">
      <text x="42" y="92">B.E. Computer Science and Engineering student specialising in Cyber Security</text>
      <text x="42" y="130">Studying at Karpagam Academy of Higher Education, Coimbatore</text>
      <text x="42" y="168">Interested in SOC operations, ethical hacking, penetration testing, cloud security, and threat detection</text>
      <text x="42" y="206">Building AI and machine-learning applications using Python</text>
      <text x="42" y="244">Currently learning Splunk, Microsoft Sentinel, AWS Security, and threat hunting</text>
      <text x="42" y="282">Aspiring to become a Cyber Security Engineer specialising in AI-driven security</text>
    </g>
    <rect x="24" y="72" width="5" height="210" rx="3" fill="url(#accent)" filter="url(#softGlow)">
      <animate attributeName="height" values="24;210;210" begin=".6s" dur="1.2s" fill="freeze"/>
    </rect>
  </g>

  <g class="fade" transform="translate(70 560)" filter="url(#shadow)">
    <animate attributeName="opacity" values="0;1" begin="1s" dur=".7s" fill="freeze"/>
    <rect class="card" x="0" y="0" width="1040" height="280" rx="22"/>
    <text class="mono label" x="34" y="48">02_technical_skills</text>

    <g class="sans muted">
      <text x="42" y="94">Programming</text>
      <text x="42" y="148">Cyber Security</text>
      <text x="42" y="202">AI and ML</text>
      <text x="42" y="256">Cloud and Tools</text>
    </g>

    <g class="sans chip">
      <g transform="translate(190 72)">
        <rect width="90" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="21" y="23">Python</text>
        <animateTransform attributeName="transform" type="scale" values="1;1.045;1" begin="1.5s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
      </g>
      <g transform="translate(292 72)"><rect width="74" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="22" y="23">HTML</text></g>
      <g transform="translate(378 72)"><rect width="168" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="20" y="23">REST API dev</text></g>

      <g transform="translate(190 126)"><rect width="70" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="20" y="23">YARA</text></g>
      <g transform="translate(272 126)"><rect width="108" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="19" y="23">Wireshark</text></g>
      <g transform="translate(392 126)"><rect width="106" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="18" y="23">Burp Suite</text></g>
      <g transform="translate(510 126)"><rect width="70" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="20" y="23">Nmap</text></g>
      <g transform="translate(592 126)"><rect width="108" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="18" y="23">Metasploit</text></g>
      <g transform="translate(712 126)"><rect width="84" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="18" y="23">Splunk</text></g>
      <g transform="translate(808 126)"><rect width="96" height="34" rx="17" fill="#111827" stroke="#a78bfa" stroke-opacity=".38"/><text x="18" y="23">Sentinel</text></g>

      <g transform="translate(190 180)"><rect width="114" height="34" rx="17" fill="#111827" stroke="#10b981" stroke-opacity=".42"/><text x="18" y="23">Scikit-learn</text></g>
      <g transform="translate(316 180)"><rect width="90" height="34" rx="17" fill="#111827" stroke="#10b981" stroke-opacity=".42"/><text x="19" y="23">XGBoost</text></g>
      <g transform="translate(418 180)"><rect width="82" height="34" rx="17" fill="#111827" stroke="#10b981" stroke-opacity=".42"/><text x="18" y="23">Pandas</text></g>
      <g transform="translate(512 180)"><rect width="78" height="34" rx="17" fill="#111827" stroke="#10b981" stroke-opacity=".42"/><text x="18" y="23">NumPy</text></g>
      <g transform="translate(602 180)"><rect width="104" height="34" rx="17" fill="#111827" stroke="#10b981" stroke-opacity=".42"/><text x="17" y="23">Matplotlib</text></g>

      <g transform="translate(190 234)"><rect width="114" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="18" y="23">AWS Security</text></g>
      <g transform="translate(316 234)"><rect width="56" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="18" y="23">Git</text></g>
      <g transform="translate(384 234)"><rect width="78" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="17" y="23">GitHub</text></g>
      <g transform="translate(474 234)"><rect width="84" height="34" rx="17" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/><text x="18" y="23">VS Code</text></g>
    </g>
  </g>

  <g class="fade" transform="translate(70 880)">
    <animate attributeName="opacity" values="0;1" begin="1.8s" dur=".7s" fill="freeze"/>
    <text class="mono label" x="0" y="0">03_featured_projects</text>
    <g filter="url(#shadow)">
      <g transform="translate(0 34)">
        <rect class="card" width="500" height="130" rx="20"/>
        <text class="sans" x="26" y="44" fill="#f8fafc" font-size="24" font-weight="800">Context-Aware Firewall</text>
        <text class="sans muted" x="26" y="80">Python firewall with app policies, domain blocking,</text>
        <text class="sans muted" x="26" y="106">real-time logs, and anomaly detection.</text>
      </g>
      <g transform="translate(540 34)">
        <rect class="card" width="500" height="130" rx="20"/>
        <text class="sans" x="26" y="44" fill="#f8fafc" font-size="24" font-weight="800">GroundSafe AI</text>
        <text class="sans muted" x="26" y="80">ML application for groundwater potability and</text>
        <text class="sans muted" x="26" y="106">contamination risk prediction.</text>
      </g>
      <g transform="translate(0 194)">
        <rect class="card" width="500" height="130" rx="20"/>
        <text class="sans" x="26" y="44" fill="#f8fafc" font-size="24" font-weight="800">Fake Website Detection</text>
        <text class="sans muted" x="26" y="80">Web-content analysis for identifying suspicious</text>
        <text class="sans muted" x="26" y="106">and potentially fraudulent websites.</text>
      </g>
      <g transform="translate(540 194)">
        <rect class="card" width="500" height="130" rx="20"/>
        <text class="sans" x="26" y="44" fill="#f8fafc" font-size="24" font-weight="800">Mini SIEM</text>
        <text class="sans muted" x="26" y="80">Python security monitor for Windows Event Logs</text>
        <text class="sans muted" x="26" y="106">and suspicious activity detection.</text>
      </g>
      <g transform="translate(0 354)">
        <rect class="card" width="1040" height="124" rx="20"/>
        <text class="sans" x="26" y="44" fill="#f8fafc" font-size="24" font-weight="800">AI Security Assistant</text>
        <text class="sans muted" x="26" y="82">Intelligent assistant for summarising alerts and supporting SOC incident investigation.</text>
      </g>
    </g>
  </g>

  <g opacity=".7">
    <circle cx="1016" cy="116" r="3" fill="#22d3ee">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1070" cy="170" r="2.4" fill="#10b981">
      <animate attributeName="opacity" values="1;.25;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="1190" r="3.2" fill="#a78bfa">
      <animate attributeName="opacity" values=".3;1;.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
