<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">Gobinathan Mugilan GitHub profile hero banner</title>
  <desc id="desc">Animated dark theme cyber security GitHub profile banner with ASCII portrait, terminal details, skills, and social links.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="asciiGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#10b981"/>
      <animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowA" cx="26%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".36"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="76%" cy="86%" r="52%">
      <stop offset="0%" stop-color="#10b981" stop-opacity=".24"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".09"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.83 0 0 0 0 1 0 0 0 .72 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity=".45"/>
    </filter>

    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .035"/>
      </feComponentTransfer>
    </filter>

    <clipPath id="roundClip">
      <rect x="18" y="18" width="1144" height="574" rx="34"/>
    </clipPath>

    <mask id="typeMask1" maskUnits="userSpaceOnUse">
      <rect x="620" y="198" width="0" height="36" fill="#fff">
        <animate attributeName="width" values="0;265;265;0;0" keyTimes="0;.18;.34;.42;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <mask id="typeMask2" maskUnits="userSpaceOnUse">
      <rect x="620" y="198" width="0" height="36" fill="#fff">
        <animate attributeName="width" values="0;0;285;285;0;0" keyTimes="0;.34;.52;.68;.78;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <mask id="typeMask3" maskUnits="userSpaceOnUse">
      <rect x="620" y="198" width="0" height="36" fill="#fff">
        <animate attributeName="width" values="0;0;315;315;0" keyTimes="0;.68;.84;.96;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <g clip-path="url(#roundClip)">
    <rect width="1180" height="610" fill="#030712"/>
    <rect width="1180" height="610" fill="url(#glowA)"/>
    <rect width="1180" height="610" fill="url(#glowB)"/>
    <rect width="1180" height="610" filter="url(#noise)" opacity=".75"/>

    <circle cx="116" cy="92" r="2" fill="#22d3ee" opacity=".45">
      <animateMotion dur="11s" repeatCount="indefinite" path="M0 0 C40 18 84 -10 126 24 C72 48 24 30 0 0"/>
    </circle>
    <circle cx="1014" cy="132" r="2.2" fill="#a78bfa" opacity=".44">
      <animateMotion dur="13s" repeatCount="indefinite" path="M0 0 C-34 44 22 72 68 24 C40 -28 10 -18 0 0"/>
    </circle>
    <circle cx="930" cy="512" r="2.4" fill="#10b981" opacity=".38">
      <animateMotion dur="15s" repeatCount="indefinite" path="M0 0 C-66 -20 -20 -76 42 -38 C78 10 28 34 0 0"/>
    </circle>

    <rect x="18" y="18" width="1144" height="574" rx="34" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-dasharray="170 810" opacity=".78">
      <animate attributeName="stroke-dashoffset" values="0;-980" dur="9s" repeatCount="indefinite"/>
    </rect>

    <g filter="url(#shadow)">
      <rect x="56" y="56" width="412" height="498" rx="26" fill="#0f172a" fill-opacity=".72" stroke="#ffffff" stroke-opacity=".08"/>
      <rect x="56" y="56" width="412" height="498" rx="26" fill="url(#glass)" opacity=".55"/>
      <path d="M84 84 H430" stroke="#fff" stroke-opacity=".08"/>

      <g transform="translate(104 132)" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="translate" values="104 132;104 124;104 132" dur="6s" repeatCount="indefinite"/>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1">
          <tspan x="0" y="0">       ____</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin=".2s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="29">    .-'    '-.</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin=".42s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="58">   /  .--.    \</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin=".64s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="87">  |  (o  o)    |</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin=".86s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="116">  |     ^      |</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin="1.08s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="145">   \  \___/   /</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin="1.3s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="174">    '-.____.-'</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin="1.52s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="203">   /|  SOC  |\</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin="1.74s" fill="freeze"/>
        </text>
        <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700" fill="url(#asciiGradient)" letter-spacing="1" opacity="0">
          <tspan x="0" y="232">  /_|_AI_SEC|_\</tspan>
          <animate attributeName="opacity" values="0;1" dur=".5s" begin="1.96s" fill="freeze"/>
        </text>
      </g>

      <rect x="78" y="108" width="368" height="318" rx="18" fill="none" stroke="#22d3ee" stroke-opacity=".12"/>
      <rect x="78" y="108" width="368" height="36" fill="#22d3ee" opacity=".055">
        <animate attributeName="y" values="108;390;108" dur="5.4s" repeatCount="indefinite"/>
      </rect>
      <text x="98" y="492" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">threats scanned: clean</text>
      <rect x="270" y="480" width="10" height="18" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g filter="url(#shadow)">
      <rect x="510" y="56" width="614" height="498" rx="26" fill="#0f172a" fill-opacity=".76" stroke="#ffffff" stroke-opacity=".08"/>
      <rect x="510" y="56" width="614" height="498" rx="26" fill="url(#glass)" opacity=".5"/>
      <path d="M536 101 H1098" stroke="#fff" stroke-opacity=".08"/>
      <circle cx="548" cy="80" r="6" fill="#ef4444"/>
      <circle cx="570" cy="80" r="6" fill="#f59e0b"/>
      <circle cx="592" cy="80" r="6" fill="#10b981"/>
      <text x="628" y="85" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">profile.sh</text>

      <text x="552" y="134" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ whoami</text>
      <text x="552" y="172" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Gobinathan Mugilan</text>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="url(#accent)">
        <text x="620" y="222" mask="url(#typeMask1)">Cyber Security Student</text>
        <text x="620" y="222" mask="url(#typeMask2)">Python Developer</text>
        <text x="620" y="222" mask="url(#typeMask3)">AI / ML Security Builder</text>
      </g>
      <text x="552" y="222" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">role:</text>
      <rect x="944" y="202" width="11" height="25" rx="2" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/>
      </rect>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
        <text x="552" y="274" fill="#94a3b8" opacity="0">location  <tspan fill="#f8fafc">Coimbatore, India</tspan><animate attributeName="opacity" values="0;1" begin=".8s" dur=".55s" fill="freeze"/></text>
        <text x="552" y="306" fill="#94a3b8" opacity="0">education <tspan fill="#f8fafc">B.E. CSE - Cyber Security</tspan><animate attributeName="opacity" values="0;1" begin="1.1s" dur=".55s" fill="freeze"/></text>
        <text x="552" y="338" fill="#94a3b8" opacity="0">focus     <tspan fill="#f8fafc">SOC, threat hunting, pentesting</tspan><animate attributeName="opacity" values="0;1" begin="1.4s" dur=".55s" fill="freeze"/></text>
        <text x="552" y="370" fill="#94a3b8" opacity="0">learning  <tspan fill="#f8fafc">Splunk, Sentinel, AWS Security</tspan><animate attributeName="opacity" values="0;1" begin="1.7s" dur=".55s" fill="freeze"/></text>
      </g>

      <g transform="translate(552 406)">
        <text x="0" y="0" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ skills --core</text>
        <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
          <g transform="translate(0 24)"><rect width="68" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="18" y="20" fill="#f8fafc">Python</text></g>
          <g transform="translate(78 24)"><rect width="62" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="19" y="20" fill="#f8fafc">YARA</text></g>
          <g transform="translate(150 24)"><rect width="72" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="19" y="20" fill="#f8fafc">Splunk</text></g>
          <g transform="translate(232 24)"><rect width="86" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="17" y="20" fill="#f8fafc">Sentinel</text></g>
          <g transform="translate(328 24)"><rect width="92" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="18" y="20" fill="#f8fafc">Wireshark</text></g>
          <g transform="translate(430 24)"><rect width="66" height="30" rx="15" fill="#111827" stroke="#22d3ee" stroke-opacity=".35"/><text x="20" y="20" fill="#f8fafc">Nmap</text></g>
          <g transform="translate(0 64)"><rect width="92" height="30" rx="15" fill="#111827" stroke="#a78bfa" stroke-opacity=".35"/><text x="18" y="20" fill="#f8fafc">Burp Suite</text></g>
          <g transform="translate(102 64)"><rect width="102" height="30" rx="15" fill="#111827" stroke="#a78bfa" stroke-opacity=".35"/><text x="17" y="20" fill="#f8fafc">Metasploit</text></g>
          <g transform="translate(214 64)"><rect width="106" height="30" rx="15" fill="#111827" stroke="#10b981" stroke-opacity=".35"/><text x="18" y="20" fill="#f8fafc">Scikit-learn</text></g>
          <g transform="translate(330 64)"><rect width="96" height="30" rx="15" fill="#111827" stroke="#10b981" stroke-opacity=".35"/><text x="18" y="20" fill="#f8fafc">Pandas</text></g>
        </g>
      </g>

      <g transform="translate(552 522)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#94a3b8">
        <circle cx="12" cy="-4" r="12" fill="#111827" stroke="#22d3ee" stroke-opacity=".45"/><text x="4" y="1" fill="#f8fafc">GH</text>
        <text x="34" y="1">github.com/Gobimugilan</text>
        <circle cx="250" cy="-4" r="12" fill="#111827" stroke="#22d3ee" stroke-opacity=".45"/><text x="242" y="1" fill="#f8fafc">IN</text>
        <text x="272" y="1">linkedin.com/in/gobinathan-mugilan-049b85290</text>
      </g>

      <rect x="510" y="56" width="614" height="498" rx="26" fill="none" stroke="url(#accent)" stroke-width="1.2" stroke-dasharray="140 680" opacity=".62">
        <animate attributeName="stroke-dashoffset" values="0;-820" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="560" y="56" width="120" height="498" fill="url(#shine)" opacity=".10" transform="skewX(-16)">
        <animateTransform attributeName="transform" type="translate" values="-210 0;780 0;-210 0" dur="7s" repeatCount="indefinite" additive="sum"/>
      </rect>
    </g>
  </g>
</svg>
